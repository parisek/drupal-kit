services:
  drupal_kit.route_subscriber:
    class: Drupal\drupal_kit\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
  drupal_kit.twig_extension:
    arguments: ["@date.formatter", "@language_manager", "@string_translation"]
    class: Drupal\drupal_kit\TwigExtension
    tags:
      - { name: twig.extension }
  drupal_kit.typography_twig_extension:
    class: Drupal\drupal_kit\Twig\TypographyExtension
    arguments: ["@theme.manager", "@extension.path.resolver", "%app.root%"]
    tags:
      - { name: twig.extension }
  drupal_kit.entity_helper:
    class: Drupal\drupal_kit\Services\EntityHelper
    arguments:
      [
        "@entity_type.manager",
        "@current_route_match",
        "@language_manager",
        "@entity.repository",
        "@config.factory",
        "@database",
        "@cache.default",
        "@menu.link_tree",
        "@file_url_generator",
        "@logger.factory",
        "@renderer",
        "@date.formatter",
        "@image.factory",
        "@request_stack",
        "@drupal_kit.menu_active_trail_resolver",
        "@drupal_kit.taxonomy_tree_builder",
        "@drupal_kit.menu_tree_builder",
        "@drupal_kit.media_array_builder",
      ]
  drupal_kit.taxonomy_tree_builder:
    class: Drupal\drupal_kit\Services\TaxonomyTreeBuilder
    arguments:
      - "@entity_type.manager"
      - "@language_manager"
  drupal_kit.menu_tree_builder:
    class: Drupal\drupal_kit\Services\MenuTreeBuilder
    arguments:
      - "@menu.link_tree"
      - "@drupal_kit.menu_active_trail_resolver"
      - "@language_manager"
      - "@entity_type.manager"
      - "@request_stack"
      # Optional — Drupal core patch (drupal.org#2466553) provides it.
      # NULL when patch is absent; filter is skipped silently.
      - "@?menu.language_tree_manipulator"
  drupal_kit.media_array_builder:
    class: Drupal\drupal_kit\Services\MediaArrayBuilder
    arguments:
      - "@language_manager"
      - "@image.factory"
      - "@logger.factory"
      - "@cache.default"
      - "@file_url_generator"
  # drupal_kit.resizer was removed in v1.4.0. Resizer is
  # a static utility — call \Drupal\drupal_kit\Services\Resizer::resizer()
  # directly. TwigExtension::getResizer does this.
  drupal_kit.menu_active_trail_resolver:
    class: Drupal\drupal_kit\Services\MenuActiveTrailResolver
    arguments:
      - "@menu.active_trail"
      - "@plugin.manager.menu.link"
      - "@breadcrumb"
      - "@current_route_match"
