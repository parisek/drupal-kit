name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Unit + Kernel tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc  # v2.37.1
        with:
          php-version: '8.3'
          extensions: gd, pdo_sqlite
          coverage: xdebug

      - run: composer validate --strict --no-check-publish

      - run: composer install --no-progress

      - name: Wire module into Drupal extension discovery
        run: scripts/dev-link-module.sh

      - run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text

      - run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

      - name: Enforce line-coverage threshold
        # Ratchet floor — raised as each batch of kernel tests lands.
        # History:
        #   v1.1.0 baseline (mocked units only): 32.31% — floor at 30
        #   v1.2.0 #18 (media kernel tests):     40.76% — interim
        #   v1.2.0 #19 (field-getter kernel):    45.88% — floor at 45
        #   v1.3.0 #31 (Resizer):                47.92%
        #   v1.3.0 #32 (image/file/media):       51.67%
        #   v1.3.0 #34 (formatField integration):51.67%
        #   v1.3.0 #35 (ComponentBase form API): 53.03% — floor at 53
        #   v1.4.0 (hardening release):          53.71% — floor stayed at 53
        #   v1.5.0 (coverage push #55):          78.42% — floor at 78
        # The remaining ~22 % is largely contrib-gated (office_hours,
        # geofield, webform getter bodies behind markTestSkipped) plus
        # DisplayBase form API. Pushing past 80 % needs either an
        # office_hours/geofield/webform require-dev pass (CI runtime
        # cost weighed) or DisplayBase form-API kernel tests.
        env:
          MIN_COVERAGE: '78'
        run: |
          php -r '
            $min = (int) getenv("MIN_COVERAGE");
            if (!file_exists("coverage.xml")) {
              fwrite(STDERR, "coverage.xml not found — Xdebug driver missing?\n");
              exit(1);
            }
            $xml = simplexml_load_file("coverage.xml");
            if ($xml === false) {
              fwrite(STDERR, "coverage.xml could not be parsed\n");
              exit(1);
            }
            $metrics = $xml->project->metrics;
            $statements = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            $pct = $statements > 0 ? 100 * $covered / $statements : 0;
            printf("Line coverage: %.2f%% (%d / %d), threshold %d%%\n", $pct, $covered, $statements, $min);
            exit($pct >= $min ? 0 : 1);
          '
