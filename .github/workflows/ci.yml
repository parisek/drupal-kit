name: CI
on: [push, pull_request]
jobs:
  test:
    name: Unit + Kernel tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc  # v2.37.1
        with:
          php-version: '8.3'
          extensions: gd, pdo_sqlite
          coverage: xdebug

      - run: composer validate --strict --no-check-publish

      - run: composer install --no-progress

      - name: Bridge web/autoload.php to vendor/autoload.php
        run: |
          mkdir -p web
          cat > web/autoload.php <<'PHP'
          <?php
          return require __DIR__ . '/../vendor/autoload.php';
          PHP

      - name: Ensure Drupal extension-discovery dirs exist
        run: mkdir -p web/profiles web/sites web/themes web/libraries web/modules/contrib

      - name: Symlink module into Drupal extension discovery path
        run: |
          target="web/modules/contrib/custom_components"
          mkdir -p "$target"
          for f in src tests templates custom_components.info.yml custom_components.module custom_components.services.yml composer.json; do
            rm -rf "$target/$f"
            ln -s "$PWD/$f" "$target/$f"
          done

      - run: vendor/bin/phpunit

      - name: Enforce line-coverage threshold
        # Ratchet floor — set just below current to catch silent
        # regressions, raise as kernel/media tests in follow-up PRs
        # add coverage. Initial state: 32.31% (461/1427) after the #4
        # safety-net subset. 80% (the v1.1.0 aspiration) requires the
        # deferred media kernel tests + ~25 untouched field-getter
        # methods on EntityHelper.
        env:
          MIN_COVERAGE: '30'
        run: |
          php -r '
            $min = (int) getenv("MIN_COVERAGE");
            $xml = simplexml_load_file("coverage.xml");
            $metrics = $xml->project->metrics;
            $statements = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            $pct = $statements > 0 ? 100 * $covered / $statements : 0;
            printf("Line coverage: %.2f%% (%d / %d), threshold %d%%\n", $pct, $covered, $statements, $min);
            exit($pct >= $min ? 0 : 1);
          '

      - run: vendor/bin/phpstan analyse
