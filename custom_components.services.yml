services:
  custom_components.route_subscriber:
    class: Drupal\custom_components\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
  custom_components.twig_extension:
    arguments: ["@date.formatter", "@language_manager"]
    class: Drupal\custom_components\TwigExtension
    tags:
      - { name: twig.extension }
  custom_components.typography_twig_extension:
    class: Drupal\custom_components\Twig\TypographyExtension
    arguments: ["@theme.manager", "@extension.path.resolver", "%app.root%"]
    tags:
      - { name: twig.extension }
  custom_components.entity_helper:
    class: Drupal\custom_components\Services\EntityHelper
    arguments:
      [
        "@entity_type.manager",
        "@current_route_match",
        "@language_manager",
        "@entity.repository",
        "@config.factory",
        "@database",
        "@cache.default",
        "@menu.link_tree",
        "@file_url_generator",
        "@logger.factory",
        "@renderer",
        "@date.formatter",
        "@image.factory",
        "@request_stack",
        "@custom_components.menu_active_trail_resolver",
        "@custom_components.taxonomy_tree_builder",
      ]
  custom_components.taxonomy_tree_builder:
    class: Drupal\custom_components\Services\TaxonomyTreeBuilder
    arguments:
      - "@entity_type.manager"
      - "@language_manager"
  custom_components.resizer:
    class: Drupal\custom_components\Services\Resizer
  custom_components.menu_active_trail_resolver:
    class: Drupal\custom_components\Services\MenuActiveTrailResolver
    arguments:
      - "@menu.active_trail"
      - "@plugin.manager.menu.link"
      - "@breadcrumb"
      - "@current_route_match"
